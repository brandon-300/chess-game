<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Chess 3D · Friends</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0806; --card: rgba(20,14,8,.95); --panel: rgba(16,10,6,.98);
            --accent: #c9a84c; --accent2: #7a6230; --text: #f0e6ce; --muted: #6b5f4e;
            --border: rgba(201,168,76,.22); --danger: #cc0000; --success: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 16px;
        }
        h1 { font-size: 24px; color: var(--accent); margin-bottom: 20px; }
        .container { width: 100%; max-width: 600px; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--panel); border-radius: 6px; padding: 4px; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: var(--muted); font-size: 14px; font-weight: 600;
            border-radius: 4px; cursor: pointer; transition: all .2s;
        }
        .tab-btn.active { background: var(--accent); color: #0a0806; }
        .panel { display: none; }
        .panel.active { display: block; }

        .friend-row {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 8px;
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%; background: var(--muted);
            border: 2px solid var(--accent); overflow: hidden; flex-shrink: 0;
            background-size: cover; background-position: center;
        }
        .info { flex: 1; }
        .name { font-weight: 600; }
        .name a { color: var(--text); text-decoration: none; cursor: pointer; }
        .name a:hover { color: var(--accent); text-decoration: underline; }
        .status { font-size: 12px; color: var(--muted); }
        .status.online { color: var(--success); }
        .action-btn {
            font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); cursor: pointer; font-weight: 600;
            transition: all .2s; white-space: nowrap;
        }
        .action-btn:hover { border-color: var(--accent); background: var(--card); }
        .action-btn.primary { background: var(--accent); border-color: transparent; color: #0a0806; }
        .action-btn.danger { border-color: var(--danger); color: var(--danger); }

        .search-box {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .search-box input {
            flex: 1; padding: 10px 14px; border-radius: 6px;
            background: var(--panel); border: 1px solid var(--border);
            color: var(--text); font-size: 14px; outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--muted); text-decoration: none;
            margin-bottom: 16px; transition: color .15s;
        }
        .back-link:hover { color: var(--text); }

        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 8px; font-size: 13px;
            opacity: 0; pointer-events: none; z-index: 99;
            transition: opacity .2s; max-width: 90vw; text-align: center;
        }
        #toast.show { opacity: 1; }
        #toast.error { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>
        <h1>Friends</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="friends-tab">Friends</button>
            <button class="tab-btn" data-tab="requests-tab">Requests</button>
            <button class="tab-btn" data-tab="add-tab">Add Friend</button>
        </div>

        <div id="friends-tab" class="panel active"></div>
        <div id="requests-tab" class="panel"></div>
        <div id="add-tab" class="panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by username...">
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
    <div id="toast"></div>

    <script src="config.js"></script>
    <script>
        (() => {
            const SUPABASE_URL = window.SUPABASE_URL;
            const SUPABASE_ANON_KEY = window.SUPABASE_KEY;
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            let currentUserId = null;
            let allUsers = [];
            let friendIds = new Set();
            const $ = id => document.getElementById(id);

            function showToast(msg, isError = false) {
                const t = $('toast');
                t.textContent = msg;
                t.className = isError ? 'error show' : 'show';
                setTimeout(() => t.classList.remove('show'), 3000);
            }

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(btn.dataset.tab).classList.add('active');
                    if (btn.dataset.tab === 'friends-tab') loadFriends();
                    if (btn.dataset.tab === 'requests-tab') loadRequests();
                    if (btn.dataset.tab === 'add-tab') renderAddTab();
                });
            });

            // ---- Load all users and friend IDs ----
            async function loadAllUsers() {
                const { data } = await supabase.from('profiles')
                    .select('id, username, avatar_url')
                    .neq('id', currentUserId)
                    .order('username', { ascending: true });
                allUsers = data || [];
            }

            async function loadFriendIds() {
                const { data } = await supabase.from('friends')
                    .select('friend_id')
                    .eq('user_id', currentUserId);
                friendIds = new Set((data || []).map(r => r.friend_id));
            }

            // ---- Render add tab with click listeners ----
            function renderAddTab(filter = '') {
                const container = $('searchResults');
                const term = filter.toLowerCase().trim();
                const filtered = term
                    ? allUsers.filter(u => u.username.toLowerCase().includes(term))
                    : allUsers;

                if (!filtered.length) {
                    container.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">No users found.</div>';
                    return;
                }
                container.innerHTML = filtered.map(u => {
                    const isFriend = friendIds.has(u.id);
                    return `
                    <div class="friend-row">
                        <div class="avatar" style="background-image:url(${u.avatar_url || ''})"></div>
                        <div class="info">
                            <div class="name">
                                <a href="profile.html?user=${u.id}">${escapeHTML(u.username)}</a>
                            </div>
                        </div>
                        ${isFriend
                            ? '<span style="font-size:12px;color:var(--muted)">Friends</span>'
                            : `<button class="action-btn primary" data-action="send-request" data-userid="${u.id}">Add Friend</button>`
                        }
                    </div>
                `}).join('');

                // Attach click listeners after rendering
                container.querySelectorAll('[data-action="send-request"]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const userId = btn.dataset.userid;
                        sendRequest(userId);
                    });
                });
            }

            // Real-time search
            $('searchInput').addEventListener('input', () => {
                renderAddTab($('searchInput').value);
            });

            // ---- Load friends list ----
            async function loadFriends() {
                const { data } = await supabase.from('friends')
                    .select('friend_id, profiles!friends_friend_id_fkey(username, avatar_url, is_online, last_seen)')
                    .eq('user_id', currentUserId);
                const friendsList = (data || []).map(row => ({
                    id: row.friend_id,
                    username: row.profiles.username,
                    avatar_url: row.profiles.avatar_url,
                    is_online: row.profiles.is_online,
                    last_seen: row.profiles.last_seen
                }));
                const container = $('friends-tab');
                if (!friendsList.length) {
                    container.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">No friends yet.</div>';
                    return;
                }
                container.innerHTML = friendsList.map(f => `
                    <div class="friend-row">
                        <div class="avatar" style="background-image:url(${f.avatar_url || ''})"></div>
                        <div class="info">
                            <div class="name">
                                <a href="profile.html?user=${f.id}">${escapeHTML(f.username)}</a>
                            </div>
                            <div class="status${f.is_online ? ' online' : ''}">${f.is_online ? 'Online' : 'Offline'}</div>
                        </div>
                        <button class="action-btn primary" data-action="invite-friend" data-userid="${f.id}">Invite</button>
                        <button class="action-btn danger" data-action="remove-friend" data-userid="${f.id}">Remove</button>
                    </div>
                `).join('');

                // Attach listeners
                container.querySelectorAll('[data-action="invite-friend"]').forEach(btn => {
                    btn.addEventListener('click', () => inviteFriend(btn.dataset.userid));
                });
                container.querySelectorAll('[data-action="remove-friend"]').forEach(btn => {
                    btn.addEventListener('click', () => removeFriend(btn.dataset.userid));
                });
            }

            // ---- Load pending requests ----
            async function loadRequests() {
                const { data: incoming } = await supabase.from('friend_requests')
                    .select('id, from_user_id, profiles!friend_requests_from_user_id_fkey(username, avatar_url)')
                    .eq('to_user_id', currentUserId).eq('status', 'pending');
                const { data: outgoing } = await supabase.from('friend_requests')
                    .select('id, to_user_id, profiles!friend_requests_to_user_id_fkey(username, avatar_url)')
                    .eq('from_user_id', currentUserId).eq('status', 'pending');
                const container = $('requests-tab');
                let html = '<h3 style="margin-bottom:12px;color:var(--accent)">Incoming</h3>';
                if (!incoming.length) html += '<div style="color:var(--muted)">None</div>';
                else incoming.forEach(req => {
                    html += `<div class="friend-row">
                        <div class="avatar" style="background-image:url(${req.profiles.avatar_url || ''})"></div>
                        <div class="info">
                            <div class="name">
                                <a href="profile.html?user=${req.from_user_id}">${escapeHTML(req.profiles.username)}</a>
                            </div>
                        </div>
                        <button class="action-btn primary" data-action="accept-request" data-requestid="${req.id}">Accept</button>
                        <button class="action-btn danger" data-action="decline-request" data-requestid="${req.id}">Decline</button>
                    </div>`;
                });
                html += '<h3 style="margin:16px 0 12px;color:var(--accent)">Outgoing</h3>';
                if (!outgoing.length) html += '<div style="color:var(--muted)">None</div>';
                else outgoing.forEach(req => {
                    html += `<div class="friend-row">
                        <div class="avatar" style="background-image:url(${req.profiles.avatar_url || ''})"></div>
                        <div class="info">
                            <div class="name">
                                <a href="profile.html?user=${req.to_user_id}">${escapeHTML(req.profiles.username)}</a>
                            </div>
                        </div>
                        <button class="action-btn danger" data-action="cancel-request" data-requestid="${req.id}">Cancel</button>
                    </div>`;
                });
                container.innerHTML = html;

                // Attach listeners
                container.querySelectorAll('[data-action="accept-request"]').forEach(btn => {
                    btn.addEventListener('click', () => acceptRequest(btn.dataset.requestid));
                });
                container.querySelectorAll('[data-action="decline-request"]').forEach(btn => {
                    btn.addEventListener('click', () => declineRequest(btn.dataset.requestid));
                });
                container.querySelectorAll('[data-action="cancel-request"]').forEach(btn => {
                    btn.addEventListener('click', () => cancelRequest(btn.dataset.requestid));
                });
            }

            function escapeHTML(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

            // ---- Actions (now regular functions, not window.globals) ----
            async function inviteFriend(friendId) {
                const code = Math.random().toString(36).substring(2,10).toUpperCase();
                const { data: profile } = await supabase.from('profiles').select('username').eq('id', currentUserId).single();
                const { error } = await supabase.from('online_games').insert({
                    room_code: code,
                    type: 'private',
                    host_player_id: currentUserId,
                    host_player_key: Math.random().toString(36),
                    host_nickname: profile.username,
                    status: 'waiting_for_joiner',
                    host_color: 'w',
                    board_state: JSON.stringify({ brd: Array(64).fill(null), turn: 'w', cas: { wK:true,wQ:true,bK:true,bQ:true }, ep: null }),
                    timer_w: 60, timer_b: 60
                });
                if (error) { showToast('Could not create room', true); return; }
                await supabase.from('match_invites').insert({
                    from_user_id: currentUserId,
                    to_user_id: friendId,
                    room_code: code,
                    status: 'pending'
                });
                showToast('Invite sent!');
            }

            async function removeFriend(friendId) {
                if (!confirm('Remove this friend?')) return;
                await supabase.from('friends').delete().eq('user_id', currentUserId).eq('friend_id', friendId);
                await supabase.from('friends').delete().eq('user_id', friendId).eq('friend_id', currentUserId);
                friendIds.delete(friendId);
                loadFriends();
            }

            async function acceptRequest(requestId) {
                const { data: req } = await supabase.from('friend_requests').select('*').eq('id', requestId).single();
                if (!req || req.to_user_id !== currentUserId) return;
                await supabase.from('friend_requests').update({ status: 'accepted' }).eq('id', requestId);
                await supabase.from('friends').insert({ user_id: req.from_user_id, friend_id: req.to_user_id });
                await supabase.from('friends').insert({ user_id: req.to_user_id, friend_id: req.from_user_id });
                friendIds.add(req.from_user_id);
                loadRequests();
                loadFriends();
            }

            async function declineRequest(requestId) {
                await supabase.from('friend_requests').update({ status: 'declined' }).eq('id', requestId).eq('to_user_id', currentUserId);
                loadRequests();
            }

            async function cancelRequest(requestId) {
                await supabase.from('friend_requests').delete().eq('id', requestId).eq('from_user_id', currentUserId);
                loadRequests();
            }

            async function sendRequest(toUserId) {
                if (friendIds.has(toUserId)) {
                    showToast('You are already friends.', true);
                    return;
                }
                const { data: exist } = await supabase.from('friend_requests')
                    .select('id').eq('from_user_id', currentUserId).eq('to_user_id', toUserId).eq('status', 'pending').maybeSingle();
                if (exist) {
                    showToast('Request already pending.', true);
                    return;
                }
                const { data: incoming } = await supabase.from('friend_requests')
                    .select('id').eq('from_user_id', toUserId).eq('to_user_id', currentUserId).eq('status', 'pending').maybeSingle();
                if (incoming) {
                    showToast('This user already sent you a request. Accept it instead.', true);
                    return;
                }
                const { error } = await supabase.from('friend_requests').insert({ from_user_id: currentUserId, to_user_id, status: 'pending' });
                if (error) {
                    showToast('Error sending request: ' + error.message, true);
                } else {
                    showToast('Friend request sent!');
                    renderAddTab($('searchInput').value);
                }
            }

            async function init() {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'user_login.html?redirect=' + encodeURIComponent(window.location.pathname);
                    return;
                }
                currentUserId = session.user.id;
                await loadAllUsers();
                await loadFriendIds();
                loadFriends();
                renderAddTab();
            }
            init();
        })();
    </script>
</body>
</html>
