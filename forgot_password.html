<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chess 3D · Forgot Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0806; --card:rgba(20,14,8,.95); --panel:rgba(16,10,6,.98);
    --accent:#c9a84c; --accent2:#7a6230;
    --text:#f0e6ce; --muted:#6b5f4e; --border:rgba(201,168,76,.22);
    --danger:#cc0000; --success:#2ed573;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .bg-glow{position:absolute;inset:0;z-index:0}
  .bg-glow::before,.bg-glow::after{
    content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;
  }
  .bg-glow::before{width:500px;height:500px;background:var(--accent);top:-20%;left:-10%}
  .bg-glow::after{width:400px;height:400px;background:var(--accent);bottom:-20%;right:-10%;opacity:0.06}

  .card{
    position:relative;z-index:1;width:100%;max-width:420px;
    background:rgba(16,10,6,.70);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);border-radius:4px;padding:32px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .card h2{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;text-align:center;color:var(--accent);letter-spacing:.02em}
  .card .desc{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.5}
  .field{margin-bottom:18px;position:relative}
  .field input{
    width:100%;padding:14px 14px 14px 44px;border-radius:4px;
    background:var(--panel);border:1px solid var(--border);
    color:var(--text);font-size:16px;outline:none;
    transition:border-color .15s;font-family:'Inter',sans-serif;
  }
  .field input:focus{border-color:var(--accent)}
  .field .icon{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:20px;color:var(--muted);pointer-events:none;
  }
  .submit-btn{
    width:100%;padding:14px;border:none;border-radius:4px;
    background:var(--accent);color:#0a0806;font-size:15px;font-weight:700;
    cursor:pointer;transition:filter .15s,opacity .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Inter',sans-serif;letter-spacing:.02em;text-transform:uppercase;
  }
  .submit-btn:hover{filter:brightness(1.08)}
  .submit-btn:disabled{opacity:.6;cursor:default}
  .err-msg{font-family:'Inter',sans-serif;font-size:13px;color:var(--danger);margin-top:12px;text-align:center;display:none}
  .err-msg.show{display:block}
  .success-msg{font-family:'Inter',sans-serif;font-size:13px;color:var(--accent);margin-top:12px;text-align:center;display:none}
  .success-msg.show{display:block}
  .back-link{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:24px;font-size:14px;color:var(--muted);text-decoration:none;
    transition:color .15s;font-family:'Inter',sans-serif;letter-spacing:.02em;
  }
  .back-link:hover{color:var(--text)}
  .back-link .material-symbols-outlined{font-size:18px}

  .countdown-text {
    text-align: center; margin-top: 12px; font-size: 14px; color: var(--accent);
    font-family: 'Inter', sans-serif;
  }

  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-spinner{
    width:20px;height:20px;border:2px solid transparent;
    border-top-color:#0a0806;border-radius:50%;animation:spin .7s linear infinite;
    display:inline-block;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card">
    <h2 id="title">Reset your password</h2>
    <p class="desc" id="description">Enter your username or email and we'll send a reset link.</p>

    <div class="field" id="usernameField">
      <span class="icon material-symbols-outlined">person</span>
      <input type="text" id="username" placeholder="Username or Email" />
    </div>

    <div class="countdown-text" id="countdown" style="display:none;"></div>

    <div class="err-msg" id="err"></div>
    <div class="success-msg" id="success"></div>

    <button class="submit-btn" id="resetBtn">
      <span id="resetBtnText">Send reset link</span>
    </button>

    <a href="user_login.html" class="back-link">
      <span class="material-symbols-outlined">arrow_back</span> Back to Login
    </a>
  </div>

  <script src="config.js"></script>
  <script>
  (() => {
    const SUPABASE_URL = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_KEY;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);

    // Handle ?email= parameter (from login modal)
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam && emailParam.includes('@')) {
      document.getElementById('username').value = emailParam;
      document.getElementById('description').textContent = `We'll send a reset link to ${emailParam}.`;
    }

    let cooldownInterval = null;

    function startCooldownTimer(lastChangeISO) {
      const lastChange = new Date(lastChangeISO).getTime();
      const oneHourMs = 60 * 60 * 1000;
      const endTime = lastChange + oneHourMs;

      function updateTimer() {
        const now = Date.now();
        const remaining = Math.max(0, endTime - now);
        if (remaining <= 0) {
          clearInterval(cooldownInterval);
          cooldownInterval = null;
          $("countdown").style.display = "none";
          $("resetBtn").disabled = false;
          $("resetBtnText").textContent = "Send reset link";
          $("err").classList.remove("show");
          return;
        }
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        $("countdown").textContent = `You can request another reset in ${minutes}m ${seconds.toString().padStart(2,'0')}s`;
        $("countdown").style.display = "block";
        $("resetBtn").disabled = true;
      }

      updateTimer();
      cooldownInterval = setInterval(updateTimer, 1000);
    }

    $("resetBtn").addEventListener("click", async () => {
      const err = $("err");
      const success = $("success");

      err.classList.remove("show");
      success.classList.remove("show");

      // Stop any running countdown
      if (cooldownInterval) {
        clearInterval(cooldownInterval);
        cooldownInterval = null;
        $("countdown").style.display = "none";
        $("resetBtn").disabled = false;
      }

      const input = $("username").value.trim();
      if (!input) {
        err.textContent = "Please enter your username or email.";
        err.classList.add("show");
        return;
      }

      const originalHtml = $("resetBtn").innerHTML;
      $("resetBtn").innerHTML = '<span class="loading-spinner"></span> Sending…';
      $("resetBtn").disabled = true;

      try {
        let emailToSend = null;
        let lastChange = null;

        if (input.includes('@')) {
          const { data: profile, error: lookupError } = await supabase
            .from("profiles")
            .select("id, email, password_changed_at")
            .eq("email", input)
            .maybeSingle();
          if (lookupError) throw lookupError;
          if (!profile) throw new Error("No account found with that email.");
          emailToSend = profile.email;
          lastChange = profile.password_changed_at;
        } else {
          const { data: profile, error: lookupError } = await supabase
            .from("profiles")
            .select("id, email, password_changed_at")
            .eq("username", input)
            .maybeSingle();
          if (lookupError) throw lookupError;
          if (!profile) throw new Error("No account found with that username.");
          emailToSend = profile.email;
          lastChange = profile.password_changed_at;
        }

        if (lastChange) {
          const lastChangeTime = new Date(lastChange).getTime();
          const oneHourAgo = Date.now() - 60 * 60 * 1000;
          if (lastChangeTime > oneHourAgo) {
            // Start countdown and stop
            $("resetBtn").innerHTML = originalHtml;
            $("resetBtn").disabled = true;
            startCooldownTimer(lastChange);
            return;
          }
        }

        const { error: resetError } = await supabase.auth.resetPasswordForEmail(emailToSend, {
          redirectTo: window.location.origin + "/reset_password.html",
        });
        if (resetError) throw resetError;

        $("resetBtn").innerHTML = '<span class="material-symbols-outlined">check_circle</span> Sent!';
        $("resetBtn").style.background = 'var(--success)';
        success.textContent = "Reset link sent! Check your email.";
        success.classList.add("show");

        setTimeout(() => {
          $("resetBtn").innerHTML = originalHtml;
          $("resetBtn").style.background = 'var(--accent)';
          $("resetBtn").disabled = false;
        }, 3000);
      } catch (e) {
        err.textContent = e.message || "Something went wrong.";
        err.classList.add("show");
        $("resetBtn").innerHTML = originalHtml;
        $("resetBtn").disabled = false;
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("resetBtn").click();
    });
  })();
  </script>
</body>
</html>
