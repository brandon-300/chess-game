<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chess 3D · Edit Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0806;
            --card: rgba(20, 14, 8, 0.95);
            --panel: rgba(16, 10, 6, 0.98);
            --accent: #c9a84c;
            --accent2: #7a6230;
            --text: #f0e6ce;
            --muted: #6b5f4e;
            --border: rgba(201, 168, 76, 0.22);
            --danger: #cc0000;
            --success: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .container {
            width: 100%; max-width: 500px;
            background: rgba(16,10,6,.70); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 4px; padding: 32px 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,.5);
        }
        h2 {
            font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700;
            margin-bottom: 24px; text-align: center; color: var(--accent); letter-spacing: .02em;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; color: var(--accent2); margin-bottom: 6px; font-weight: 500;
            letter-spacing: .05em;
        }
        .field input, .field select {
            width: 100%; padding: 12px 14px; border-radius: 4px;
            background: var(--panel); border: 1px solid var(--border);
            color: var(--text); font-size: 16px; outline: none;
            transition: border-color .15s; font-family: inherit;
        }
        .field input:focus, .field select:focus { border-color: var(--accent); }
        .field input[readonly] { opacity: 0.8; cursor: default; }

        .dob-row {
            display: flex; gap: 8px;
        }
        .dob-row select {
            flex: 1; padding: 12px 8px; border-radius: 4px; background: var(--panel);
            border: 1px solid var(--border); color: var(--text); font-size: 16px; outline: none;
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236b5f4e'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat; background-position: right 8px center; padding-right: 30px;
            font-family: inherit;
        }

        .btn-row {
            display: flex; gap: 12px; margin-top: 24px;
        }
        .btn {
            flex: 1; padding: 14px; border-radius: 4px; font-size: 15px; font-weight: 600;
            cursor: pointer; text-align: center; border: 1px solid var(--border);
            background: var(--panel); color: var(--text);
            font-family: inherit; letter-spacing: .02em;
            transition: all .15s;
        }
        .btn.primary { background: var(--accent); border-color: transparent; color: #0a0806; }
        .btn.primary:hover { filter: brightness(1.08); }
        .btn:hover { border-color: var(--accent); background: var(--card); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: #0a0806;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
            opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 90vw; word-wrap: break-word; white-space: normal;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error { border-color: var(--danger); color: var(--danger); }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Edit Profile</h2>
        <div class="field">
            <label for="fullNameInput">Full name</label>
            <input id="fullNameInput" type="text" placeholder="Full name" />
        </div>
        <div class="field">
            <label for="usernameInput">Username</label>
            <input id="usernameInput" type="text" placeholder="Username" />
        </div>
        <div class="field">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="Email" />
        </div>
        <div class="field">
            <label>Date of birth</label>
            <div class="dob-row">
                <select id="dobDay"><option value="">Day</option></select>
                <select id="dobMonth"><option value="">Month</option></select>
                <select id="dobYear"><option value="">Year</option></select>
            </div>
        </div>
        <div class="field">
            <label for="ageInput">Age (auto‑calculated)</label>
            <input id="ageInput" type="text" readonly placeholder="From date of birth" />
        </div>
        <div class="field">
            <label for="countryInput">Country</label>
            <input id="countryInput" type="text" placeholder="Country" />
        </div>

        <div class="btn-row">
            <button class="btn" id="cancelBtn">Cancel</button>
            <button class="btn primary" id="saveBtn">Save</button>
        </div>
    </div>

    <div id="toast"></div>

    <script src="config.js"></script>
    <script>
        (() => {
            const SUPABASE_URL = window.SUPABASE_URL;
            const SUPABASE_ANON_KEY = window.SUPABASE_KEY;
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const $ = id => document.getElementById(id);
            let currentUserId = null;
            let originalEmail = '';

            // DOB dropdowns
            const dobDay = $("dobDay"), dobMonth = $("dobMonth"), dobYear = $("dobYear");
            const ageField = $("ageInput");
            const currentYear = new Date().getFullYear();
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            for (let i = 1; i <= 12; i++) { const o = document.createElement("option"); o.value = i; o.textContent = monthNames[i-1]; dobMonth.appendChild(o); }
            for (let y = currentYear; y >= 1900; y--) { const o = document.createElement("option"); o.value = y; o.textContent = y; dobYear.appendChild(o); }
            function getDaysInMonth(m, y) { if (!m || !y) return 31; return new Date(y, m, 0).getDate(); }
            function populateDays() {
                const m = parseInt(dobMonth.value), y = parseInt(dobYear.value), days = getDaysInMonth(m||1, y||2000), cur = dobDay.value ? parseInt(dobDay.value) : 0;
                dobDay.innerHTML = '<option value="">Day</option>';
                for (let d = 1; d <= days; d++) { const o = document.createElement("option"); o.value = d; o.textContent = d; dobDay.appendChild(o); }
                if (cur > 0 && cur <= days) dobDay.value = cur; else dobDay.value = "";
            }
            dobMonth.addEventListener("change", populateDays); dobYear.addEventListener("change", populateDays); populateDays();
            function updateAgeField() {
                const d = parseInt(dobDay.value), m = parseInt(dobMonth.value), y = parseInt(dobYear.value);
                if (!d || !m || !y) { ageField.value = ""; return; }
                const dob = new Date(y, m-1, d), now = new Date();
                let age = now.getFullYear() - dob.getFullYear();
                const md = now.getMonth() - dob.getMonth(); if (md < 0 || (md === 0 && now.getDate() < dob.getDate())) age--;
                ageField.value = age;
            }
            dobDay.addEventListener("change", updateAgeField); dobMonth.addEventListener("change", updateAgeField); dobYear.addEventListener("change", updateAgeField);

            // Toast
            let toastTimer;
            function showToast(msg, type = 'success') {
                const toast = $('toast');
                toast.textContent = msg;
                toast.className = type;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // Button loading
            function setButtonLoading(btn, loading, label) {
                if (loading) {
                    btn._originalHTML = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = `<span class="btn-spinner"></span> ${label || ''}`;
                } else {
                    btn.innerHTML = btn._originalHTML || btn.innerHTML;
                    btn.disabled = false;
                    delete btn._originalHTML;
                }
            }

            // Cancel button
            $('cancelBtn').addEventListener('click', () => {
                window.location.href = 'profile.html';
            });

            // Save button
            $('saveBtn').addEventListener('click', async () => {
                const fullName = $('fullNameInput').value.trim();
                const username = $('usernameInput').value.trim();
                const email = $('emailInput').value.trim();
                const day = parseInt(dobDay.value), month = parseInt(dobMonth.value), year = parseInt(dobYear.value);
                const age = parseInt(ageField.value,10);
                const country = $('countryInput').value.trim();

                if (!fullName || !username || !email) {
                    showToast('Full name, username and email are required.', 'error');
                    return;
                }
                if (!day || !month || !year) {
                    showToast('Please select your date of birth.', 'error');
                    return;
                }
                if (isNaN(age) || age < 14) {
                    showToast('You must be at least 14 years old.', 'error');
                    return;
                }

                setButtonLoading($('saveBtn'), true, 'Saving…');

                try {
                    const { data: exist } = await supabase.from('profiles')
                        .select('id').eq('username', username).neq('id', currentUserId)
                        .maybeSingle();
                    if (exist) {
                        showToast('Username already taken.', 'error');
                        setButtonLoading($('saveBtn'), false);
                        return;
                    }

                    if (email !== originalEmail) {
                        const { error: authUpdateErr } = await supabase.auth.updateUser({ email });
                        if (authUpdateErr) throw new Error('Failed to update login email: ' + authUpdateErr.message);
                    }

                    const dob = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const updates = {
                        full_name: fullName,
                        username,
                        email,
                        age,
                        dob,
                        country: country || null
                    };

                    const { error: updateErr } = await supabase.from('profiles')
                        .update(updates).eq('id', currentUserId);
                    if (updateErr) throw updateErr;

                    showToast('Profile updated!', 'success');
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } catch (e) {
                    showToast(e.message || 'Error saving profile.', 'error');
                    setButtonLoading($('saveBtn'), false);
                }
            });

            async function init() {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = "user_login.html?redirect=" + encodeURIComponent(window.location.pathname);
                    return;
                }
                currentUserId = session.user.id;

                const { data: profile } = await supabase.from('profiles')
                    .select('*').eq('id', currentUserId).single();

                if (profile) {
                    $('fullNameInput').value = profile.full_name || '';
                    $('usernameInput').value = profile.username || '';
                    $('emailInput').value = profile.email || '';
                    originalEmail = profile.email || '';
                    $('countryInput').value = profile.country || '';

                    if (profile.dob) {
                        const parts = profile.dob.split('-');
                        if (parts.length === 3) {
                            const y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
                            dobYear.value = y;
                            dobMonth.value = m;
                            populateDays();
                            dobDay.value = d;
                            updateAgeField();
                        }
                    }
                }
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
