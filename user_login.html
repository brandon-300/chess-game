<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chess 3D · Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0806; --card:rgba(20,14,8,.95); --panel:rgba(16,10,6,.98);
    --accent:#c9a84c; --accent2:#7a6230;
    --text:#f0e6ce; --muted:#6b5f4e; --border:rgba(201,168,76,.22);
    --danger:#cc0000; --success:#2ed573;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:16px;position:relative;overflow-y:auto;
    -webkit-font-smoothing:antialiased;
  }
  .bg-glow{position:fixed;inset:0;z-index:0}
  .bg-glow::before,.bg-glow::after{
    content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;
  }
  .bg-glow::before{width:500px;height:500px;background:var(--accent);top:-20%;left:-10%}
  .bg-glow::after{width:400px;height:400px;background:var(--accent);bottom:-20%;right:-10%;opacity:0.06}

  .container{
    position:relative;z-index:1;width:100%;max-width:440px;
    background:rgba(16,10,6,.70);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);border-radius:4px;padding:32px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);margin:20px 0;
  }
  .tabs{display:flex;gap:0;margin-bottom:28px;background:var(--panel);border-radius:4px;padding:4px}
  .tab-btn{
    flex:1;padding:10px;border:none;background:transparent;
    color:var(--muted);font-size:14px;font-weight:600;
    border-radius:4px;cursor:pointer;transition:all .25s ease;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    letter-spacing:.05em;
  }
  .tab-btn.active{background:var(--accent);color:#0a0806;box-shadow:0 4px 12px rgba(201,168,76,.3)}
  .forms-wrapper{overflow:hidden;position:relative}
  .forms-slider{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .form-panel{min-width:100%;padding:0 2px}
  .form-panel h2{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:22px;font-weight:700;margin-bottom:20px;text-align:center;
    color:var(--accent);letter-spacing:.02em;
  }
  .field{margin-bottom:16px}
  .field label{
    display:block;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:11px;color:var(--accent2);margin-bottom:6px;font-weight:500;
    letter-spacing:.05em;
  }
  .field input,.field select{
    width:100%;padding:12px 14px;border-radius:4px;
    background:var(--panel);border:1px solid var(--border);
    color:var(--text);font-size:16px;outline:none;
    transition:border-color .15s;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .field input:focus,.field select:focus{border-color:var(--accent)}
  .field input.invalid-age{border-color:var(--danger)!important;color:var(--danger)!important}
  .pwd-wrap{position:relative}
  .pwd-wrap input{padding-right:48px}
  .pwd-wrap .reveal{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);font-size:20px;
    cursor:pointer;padding:4px;line-height:1;
  }
  .pwd-wrap .reveal:hover{color:var(--text)}
  .submit-btn{
    width:100%;padding:14px;border:none;border-radius:4px;
    background:var(--accent);color:#0a0806;font-size:15px;font-weight:600;
    cursor:pointer;transition:filter .15s;margin-top:8px;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    letter-spacing:.02em;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed}
  .submit-btn:hover:not(:disabled){filter:brightness(1.08)}

  .google-divider {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 16px 0;
    color: var(--muted);
    font-family: 'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .google-divider::before, .google-divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px dashed rgba(201, 168, 76, 0.15);
  }
  .google-divider:not(:empty)::before { margin-right: .5em; }
  .google-divider:not(:empty)::after { margin-left: .5em; }

  .oauth-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    font-family: 'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    letter-spacing: .02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .oauth-btn:hover {
    background: rgba(201, 168, 76, 0.08);
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(201, 168, 76, 0.1);
  }
  .oauth-btn svg { display: block; }
  .oauth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-spinner {
    width: 18px;height:18px;border:2px solid transparent;
    border-top-color:#0a0806;border-radius:50%;
    animation:spin .7s linear infinite;
    display:inline-block;
  }
  .oauth-btn .loading-spinner {
    border-top-color: currentColor;
  }

  .err-msg, .success-msg{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:12px;margin-top:8px;display:none;
  }
  .err-msg{color:var(--danger)} .success-msg{color:var(--accent)}
  .err-msg.show, .success-msg.show{display:block}
  .age-error-text{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:11px;color:var(--danger);margin-top:4px;display:none;
  }
  .age-error-text.show{display:block}

  .switch-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
  .switch-link button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font:inherit}
  .back-link{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:24px;font-size:14px;color:var(--muted);text-decoration:none;
    transition:color .15s;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    letter-spacing:.02em;
  }
  .back-link:hover{color:var(--text)}
  .back-link .material-symbols-outlined{font-size:18px}
  .forgot-link{display:block;text-align:right;margin-top:8px}
  .forgot-link a{font-size:12px;color:var(--muted);text-decoration:underline}
  .forgot-link a:hover{color:var(--text)}
  .dob-row{display:flex;gap:8px}
  .dob-row select{
    flex:1;padding:12px 8px;border-radius:4px;background:var(--panel);
    border:1px solid var(--border);color:var(--text);font-size:16px;outline:none;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236b5f4e'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center;padding-right:30px;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .dob-row select:focus{border-color:var(--accent)}

  /* Toast – now wraps text and allows longer messages */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
    opacity: 0; pointer-events: none; z-index: 9999;
    transition: opacity 0.2s ease, transform 0.2s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    max-width: 90vw; word-wrap: break-word; white-space: normal;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* Email modal */
  .email-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; justify-content: center; align-items: center;
  }
  .email-modal.show { display: flex; }
  .email-modal-content {
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 8px; padding: 24px; max-width: 340px; width: 90%;
    text-align: center;
  }
  .email-modal-content h3 { color: var(--accent); margin-bottom: 12px; }
  .email-modal-content input { margin-bottom: 12px; }
  .email-modal-content .submit-btn { margin-bottom: 8px; }
  .email-modal-content .btn { width: 100%; margin-bottom: 8px; }
  .email-status { font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">Log in</button>
      <button class="tab-btn" id="tabSignup">Sign up</button>
    </div>
    <div class="forms-wrapper">
      <div class="forms-slider" id="slider">

        <!-- LOGIN PANEL -->
        <div class="form-panel" id="loginPanel">
          <h2>Welcome back</h2>
          <div class="field">
            <label for="loginUsername">Username</label>
            <input id="loginUsername" type="text" autocomplete="username" placeholder="Your username" />
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>

              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" />

            </div>
          </div>
          <div class="forgot-link"><a href="forgot_password.html">Forgot password?</a></div>
          <div class="err-msg" id="loginErr"></div>
          <button class="submit-btn" id="loginSubmit">Log in</button>

          <div class="google-divider"><span>or sign in with</span></div>

          <!-- Google -->
          <button type="button" class="oauth-btn" id="googleSubmit">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>

          <!-- Apple -->
          <button type="button" class="oauth-btn" id="appleSubmit">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#fff"/>
            </svg>
            Sign in with Apple
          </button>

          <!-- Facebook -->
          <button type="button" class="oauth-btn" id="facebookSubmit">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z" fill="#1877F2"/>
            </svg>
            Sign in with Facebook
          </button>

          <!-- GitHub -->
          <button type="button" class="oauth-btn" id="githubSubmit">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z" fill="#fff"/>
            </svg>
            Sign in with GitHub
          </button>

          <!-- Passkey -->
          <button type="button" class="oauth-btn" id="passkeySubmit">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.83 10.5a3.5 3.5 0 1 1 0 1.5H13v3a1 1 0 0 1-1 1H9v2H6v-2a1 1 0 0 1-1-1v-4.5H4a3.5 3.5 0 1 1 2.12-3.18c.28.42.47.9.54 1.42l.03.26H12.83zM4 10.5a1.5 1.5 0 1 0 3 0 1.5 1.5 0 0 0-3 0zm10 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" fill="#fff"/>
              <path d="M21 17.5c0 .83-.67 1.5-1.5 1.5H19v1.5c0 .83-.67 1.5-1.5 1.5h-1c-.83 0-1.5-.67-1.5-1.5V19h-1.5c-.83 0-1.5-.67-1.5-1.5v-1c0-.83.67-1.5 1.5-1.5H19c.83 0 1.5.67 1.5 1.5v1h1v-5h-5v-1.5h5.5c.83 0 1.5.67 1.5 1.5v4z" fill="#fff"/>
            </svg>
            Sign in with Passkey
          </button>

          <!-- Email -->
          <button type="button" class="oauth-btn" id="emailLoginBtn">
            <span class="material-symbols-outlined">email</span>
            Sign in with Email
          </button>

          <div class="switch-link">
            Don't have an account? <button id="switchToSignup">Sign up</button>
          </div>
        </div>

        <!-- SIGNUP PANEL (unchanged) -->
        <div class="form-panel" id="signupPanel">
          <h2>Create account</h2>
          <div class="field"><label for="signupFirstName">First name</label><input id="signupFirstName" type="text" autocomplete="given-name" placeholder="First name" /></div>
          <div class="field"><label for="signupLastName">Last name</label><input id="signupLastName" type="text" autocomplete="family-name" placeholder="Last name" /></div>
          <div class="field"><label>Date of birth</label><div class="dob-row"><select id="dobDay"><option value="">Day</option></select><select id="dobMonth"><option value="">Month</option></select><select id="dobYear"><option value="">Year</option></select></div></div>
          <div class="field"><label for="signupAge">Age (auto‑calculated)</label><input id="signupAge" type="text" readonly placeholder="From date of birth" /><div class="age-error-text" id="ageError"></div></div>
          <div class="field"><label for="signupCountry">Country</label><input id="signupCountry" type="text" placeholder="Your country" /></div>
          <div class="field"><label for="signupUsername">Username</label><input id="signupUsername" type="text" autocomplete="username" placeholder="Choose a username" /></div>
          <div class="field"><label for="signupEmail">Email</label><input id="signupEmail" type="email" autocomplete="email" placeholder="your@email.com" /></div>
          <div class="field"><label for="signupPassword">Password</label><div class="pwd-wrap"><input id="signupPassword" type="password" autocomplete="new-password" placeholder="At least 8 chars, 1 letter, 1 number, 1 special" /><button type="button" class="reveal" data-target="signupPassword"><span class="material-symbols-outlined">visibility</span></button></div></div>
          <div class="err-msg" id="signupErr"></div><div class="success-msg" id="signupSuccess"></div>
          <button class="submit-btn" id="signupSubmit">Sign up</button>
          <div class="switch-link">Already have an account? <button id="switchToLogin">Log in</button></div>
        </div>
      </div>
    </div>
    <a href="index.html" class="back-link">
      <span class="material-symbols-outlined">arrow_back</span> Back to Home
    </a>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Email modal -->
  <div class="email-modal" id="emailModal">
    <div class="email-modal-content glass-panel">
      <h3>Sign in with Email</h3>
      <div class="field">
        <input id="emailModalInput" type="email" autocomplete="email" placeholder="your@email.com" />
        <div id="emailModalStatus" class="email-status" style="color:var(--muted)"></div>
      </div>
      <button class="submit-btn" id="sendMagicLinkBtn" style="display:none;">Send Magic Link</button>
      <button class="btn" id="emailModalCloseBtn">Cancel</button>
    </div>
  </div>

<script>
(() => {
  const SUPABASE_URL = "https://akrxbxzcvnspbmvgdrci.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_OZxwZSoSNj9r0MIqVYZtbQ_NwNK0MlS";
  // Enable experimental passkey API
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      experimental: { passkey: true }
    }
  });

  const $ = id => document.getElementById(id);
  const slider = $("slider");
  const tabLogin = $("tabLogin");
  const tabSignup = $("tabSignup");

  // DOB dropdowns (unchanged)
  const dobDay = $("dobDay"), dobMonth = $("dobMonth"), dobYear = $("dobYear");
  const signupAge = $("signupAge"), ageError = $("ageError");
  const currentYear = new Date().getFullYear();
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  for (let i = 1; i <= 12; i++) { const o = document.createElement("option"); o.value = i; o.textContent = monthNames[i-1]; dobMonth.appendChild(o); }
  for (let y = currentYear; y >= 1900; y--) { const o = document.createElement("option"); o.value = y; o.textContent = y; dobYear.appendChild(o); }
  function getDaysInMonth(m, y) { if (!m || !y) return 31; return new Date(y, m, 0).getDate(); }
  function populateDays() {
    const m = parseInt(dobMonth.value), y = parseInt(dobYear.value), days = getDaysInMonth(m||1, y||2000), cur = dobDay.value ? parseInt(dobDay.value) : 0;
    dobDay.innerHTML = '<option value="">Day</option>';
    for (let d = 1; d <= days; d++) { const o = document.createElement("option"); o.value = d; o.textContent = d; dobDay.appendChild(o); }
    if (cur > 0 && cur <= days) dobDay.value = cur; else dobDay.value = "";
  }
  dobMonth.addEventListener("change", populateDays); dobYear.addEventListener("change", populateDays); populateDays();
  function updateAgeField() {
    const d = parseInt(dobDay.value), m = parseInt(dobMonth.value), y = parseInt(dobYear.value);
    if (!d || !m || !y) { signupAge.value = ""; signupAge.classList.remove("invalid-age"); ageError.classList.remove("show"); return; }
    const dob = new Date(y, m-1, d), now = new Date();
    let age = now.getFullYear() - dob.getFullYear();
    const md = now.getMonth() - dob.getMonth(); if (md < 0 || (md === 0 && now.getDate() < dob.getDate())) age--;
    signupAge.value = age;
    if (age < 14) { signupAge.classList.add("invalid-age"); ageError.textContent = "You must be at least 14 years old."; ageError.classList.add("show"); }
    else { signupAge.classList.remove("invalid-age"); ageError.classList.remove("show"); }
  }
  dobDay.addEventListener("change", updateAgeField); dobMonth.addEventListener("change", updateAgeField); dobYear.addEventListener("change", updateAgeField);

  // Tab switching
  function switchTab(index, tab) {
    slider.style.transform = `translateX(-${index*100}%)`;
    [tabLogin, tabSignup].forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    clearMessages();
  }
  tabLogin.addEventListener("click", () => switchTab(0, tabLogin));
  tabSignup.addEventListener("click", () => switchTab(1, tabSignup));
  $("switchToSignup").addEventListener("click", () => switchTab(1, tabSignup));
  $("switchToLogin").addEventListener("click", () => switchTab(0, tabLogin));

  // Password reveal
  document.querySelectorAll(".reveal").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (input) {
        const isPw = input.type === "password";
        input.type = isPw ? "text" : "password";
        btn.querySelector('span').textContent = isPw ? "visibility_off" : "visibility";
      }
    });
  });

  // --- Toast ---
  let toastTimer;
  function showToast(msg, type = 'success', duration = 3000) {
    const toast = $('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.className = type;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, duration);
  }

  // --- Button loading helper (only for login/signup buttons) ---
  function setButtonLoading(btn, loading, label) {
    if (loading) {
      btn._originalHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="loading-spinner"></span> ${label || ''}`;
    } else {
      btn.innerHTML = btn._originalHTML || btn.innerHTML;
      btn.disabled = false;
      delete btn._originalHTML;
    }
  }

  function clearMessages() {
    const loginErr = $("loginErr"), signupErr = $("signupErr"), signupSuccess = $("signupSuccess");
    if (loginErr) loginErr.classList.remove("show");
    if (signupErr) signupErr.classList.remove("show");
    if (signupSuccess) signupSuccess.classList.remove("show");
    signupAge.classList.remove("invalid-age");
    ageError.classList.remove("show");
  }

  function isValidPassword(pw) { return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && /[^a-zA-Z0-9]/.test(pw); }

  // --- Redirect logic ---
  function getRedirectUrl() {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    if (redirect && (redirect.startsWith('/') || !redirect.includes('://'))) {
      return redirect;
    }
    return 'index.html';
  }
  function getFinalRedirectPath() {
    let path = getRedirectUrl();
    if (path.startsWith('/')) path = path.substring(1);
    return path;
  }

  // --- Check if already logged in ---
  async function checkSessionAndRedirect() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = getRedirectUrl();
    }
  }

  // ---- Email Login ----
  $("loginSubmit").addEventListener("click", async function() {
    const btn = this;
    const username = $("loginUsername").value.trim(), password = $("loginPassword").value;
    if (!username || !password) { showToast("Please enter both username and password.", "error"); return; }
    setButtonLoading(btn, true, 'Logging in…');
    try {
      const { data: profile } = await supabase.from("profiles").select("email, id").eq("username", username).maybeSingle();
      if (!profile) { showToast("Username does not exist.", "error"); setButtonLoading(btn, false); return; }
      const { error: authErr } = await supabase.auth.signInWithPassword({ email: profile.email, password });
      if (authErr) throw authErr;
      await supabase.from("profiles").update({ is_online: true, last_seen: new Date().toISOString() }).eq("id", profile.id);
      window.location.href = getRedirectUrl();
    } catch(e) { showToast(e.message || "Login failed.", "error"); setButtonLoading(btn, false); }
  });

  // ---- OAuth helpers (no spinners) ----
  async function handleOAuthLogin(provider, btn) {
    try {
      const redirectUrl = window.location.origin + "/onboarding.html";
      const { error } = await supabase.auth.signInWithOAuth({ provider, options: { redirectTo: redirectUrl } });
      if (error) throw error;
    } catch(e) { showToast(e.message || `${provider} authentication failed.`, "error"); }
  }

  // Google
  const googleBtn = $("googleSubmit");
  if (googleBtn) googleBtn.addEventListener("click", () => handleOAuthLogin('google', googleBtn));

  // Apple (coming soon)
  const appleBtn = $("appleSubmit");
  if (appleBtn) {
    appleBtn.addEventListener("click", () => {
      showToast("Coming soon…", "success");
    });
  }

  // Facebook (coming soon)
  const facebookBtn = $("facebookSubmit");
  if (facebookBtn) {
    facebookBtn.addEventListener("click", () => {
      showToast("Coming soon…", "success");
    });
  }

  // GitHub
  const githubBtn = $("githubSubmit");
  if (githubBtn) githubBtn.addEventListener("click", () => handleOAuthLogin('github', githubBtn));

  // Passkey (WebAuthn)
  const passkeyBtn = $("passkeySubmit");
  if (passkeyBtn) {
    passkeyBtn.addEventListener("click", async () => {
      try {
        const { data, error } = await supabase.auth.signInWithPasskey();
        if (error) {
          if (error.message && error.message.includes("cancelled")) {
            return;
          }
          throw error;
        }
        window.location.href = "onboarding.html";
      } catch(e) {
        showToast(e.message || "Passkey authentication failed.", "error", 8000);
      }
    });
  }

  // ---- Signup ----
  $("signupSubmit").addEventListener("click", async () => {
    const btn = $("signupSubmit");
    const fn = $("signupFirstName").value.trim(), ln = $("signupLastName").value.trim();
    const country = $("signupCountry").value.trim(), username = $("signupUsername").value.trim();
    const email = $("signupEmail").value.trim(), password = $("signupPassword").value;
    const day = parseInt(dobDay.value), month = parseInt(dobMonth.value), year = parseInt(dobYear.value);
    const age = parseInt(signupAge.value,10);
    if (!fn||!ln||!country||!username||!email||!password||!day||!month||!year) { showToast("All fields are required.", "error"); return; }
    if (isNaN(age)||age<14) { showToast("You must be at least 14 years old.", "error"); return; }
    if (!isValidPassword(password)) { showToast("Password must be 8+ chars with letter, number, special.", "error"); return; }
    setButtonLoading(btn, true, 'Creating account…');
    const fullName = `${fn} ${ln}`, dob = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    try {
      const { data: exist } = await supabase.from("profiles").select("id").eq("username", username).maybeSingle();
      if (exist) { showToast("Username already taken.", "error"); setButtonLoading(btn, false); return; }
      const { data: auth, error: authErr } = await supabase.auth.signUp({ email, password, options: { data: { username, full_name: fullName }, emailRedirectTo: window.location.origin+"/index.html" } });
      if (authErr) throw authErr;
      if (!auth.user) throw new Error("Signup failed.");
      const { error: insErr } = await supabase.from("profiles").insert({ id: auth.user.id, username, full_name: fullName, age, dob, country, email });
      if (insErr) throw new Error("Profile creation failed: "+insErr.message);
      showToast("Account created! Logging you in…", "success");
      const { error: loginErr } = await supabase.auth.signInWithPassword({ email, password });
      if (loginErr) throw loginErr;
      await supabase.from("profiles").update({ is_online: true, last_seen: new Date().toISOString() }).eq("id", auth.user.id);
      window.location.href = getRedirectUrl();
    } catch(e) { showToast(e.message || "Registration failed.", "error"); setButtonLoading(btn, false); }
  });

  // ---- Email modal logic ----
  const emailModal = $("emailModal");
  const emailModalInput = $("emailModalInput");
  const emailModalStatus = $("emailModalStatus");
  const sendMagicBtn = $("sendMagicLinkBtn");
  const emailModalCloseBtn = $("emailModalCloseBtn");
  let emailCheckTimer = null;

  $("emailLoginBtn").addEventListener("click", () => {
    emailModal.classList.add("show");
    emailModalInput.value = "";
    emailModalStatus.innerHTML = "";
    sendMagicBtn.style.display = "none";
  });

  emailModalCloseBtn.addEventListener("click", () => {
    emailModal.classList.remove("show");
  });

  emailModalInput.addEventListener("input", () => {
    clearTimeout(emailCheckTimer);
    const email = emailModalInput.value.trim();
    emailModalStatus.innerHTML = "";
    sendMagicBtn.style.display = "none";

    if (!email) return;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailModalStatus.innerHTML = '<span style="color:var(--danger)">Invalid email address, please check and try again.</span>';
      return;
    }

    emailCheckTimer = setTimeout(async () => {
      try {
        const { data, error } = await supabase.from("profiles").select("id").eq("email", email).maybeSingle();
        if (error) throw error;
        if (data) {
          emailModalStatus.innerHTML = `This email is already registered. <a href="forgot_password.html?email=${encodeURIComponent(email)}" style="color:var(--accent); text-decoration:underline;">Reset your password</a>.`;
          sendMagicBtn.style.display = "none";
        } else {
          sendMagicBtn.style.display = "block";
        }
      } catch (e) {
        emailModalStatus.innerHTML = '<span style="color:var(--danger)">Error checking email.</span>';
      }
    }, 500);
  });

  sendMagicBtn.addEventListener("click", async () => {
    const email = emailModalInput.value.trim();
    if (!email) return;
    setButtonLoading(sendMagicBtn, true, 'Sending link…');
    try {
      const redirectTo = window.location.origin + "/onboarding.html";
      const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
      if (error) throw error;
      showToast("Check your email for the magic link!", "success");
      emailModal.classList.remove("show");
    } catch(e) {
      showToast(e.message || "Failed to send magic link.", "error");
    } finally {
      setButtonLoading(sendMagicBtn, false);
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key==="Enter") {
      if (tabLogin.classList.contains("active")) $("loginSubmit").click();
      else if (tabSignup.classList.contains("active")) $("signupSubmit").click();
      else if (emailModal.classList.contains("show")) sendMagicBtn.click();
    }
  });

  checkSessionAndRedirect();
})();
</script>
</body>
</html>
