<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Chess 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0806;
            --accent: #c9a84c;
            --text: #f0e6ce;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            flex-direction: column;
            gap: 1.5rem;
        }
        h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .redirect-note {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        #manualBtn {
            display: none;
            padding: 12px 24px;
            background: var(--accent);
            color: #0a0806;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <h1>Welcome to Chess 3D!</h1>
        <p>Your account has been created.</p>
        <p class="redirect-note">Redirecting to the game in <span id="countdown">5</span> seconds...</p>
        <button id="manualBtn" onclick="window.location.href='index.html'">Go to Home</button>
    </div>

    <script>
        let seconds = 5;
        const span = document.getElementById('countdown');
        const manualBtn = document.getElementById('manualBtn');
        const interval = setInterval(() => {
            seconds--;
            span.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                span.textContent = '0';
                manualBtn.style.display = 'inline-block';
                // Optional: still try auto-redirect after showing button
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            }
        }, 1000);
    </script>
</body>
</html>
