<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chess 3D · Reset Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0806; --card:rgba(20,14,8,.95); --panel:rgba(16,10,6,.98);
    --accent:#c9a84c; --accent2:#7a6230;
    --text:#f0e6ce; --muted:#6b5f4e; --border:rgba(201,168,76,.22);
    --danger:#cc0000; --success:#2ed573;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .bg-glow{position:absolute;inset:0;z-index:0}
  .bg-glow::before,.bg-glow::after{
    content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;
  }
  .bg-glow::before{width:500px;height:500px;background:var(--accent);top:-20%;left:-10%}
  .bg-glow::after{width:400px;height:400px;background:var(--accent);bottom:-20%;right:-10%;opacity:0.06}
  .tech-pattern{
    position:absolute;inset:0;z-index:0;opacity:0.04;
    background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
  }

  .card{
    position:relative;z-index:1;width:100%;max-width:440px;
    background:rgba(16,10,6,.70);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);border-radius:4px;padding:32px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .card h2{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:24px;color:var(--accent);letter-spacing:.02em}

  .field{margin-bottom:18px}
  .field label{display:block;font-family:'Inter',sans-serif;font-size:10px;color:var(--accent2);margin-bottom:6px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
  .pwd-wrap{position:relative}
  .pwd-wrap input{
    width:100%;padding:14px;padding-right:48px;border-radius:4px;
    background:var(--panel);border:1px solid var(--border);
    color:var(--text);font-size:16px;outline:none;
    transition:border-color .15s;font-family:'Inter',sans-serif;
  }
  .pwd-wrap input:focus{border-color:var(--accent)}
  .pwd-wrap .reveal{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);font-size:20px;
    cursor:pointer;padding:4px;line-height:1;
  }
  .pwd-wrap .reveal:hover{color:var(--text)}

  .strength-bars{display:flex;gap:4px;margin-bottom:10px}
  .strength-bar{height:6px;flex:1;border-radius:3px;background:var(--panel);transition:background .3s}
  .strength-bar.active{background:var(--accent)}

  .rules{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;font-size:12px}
  .rule{display:flex;align-items:center;gap:8px;color:var(--muted)}
  .rule .material-symbols-outlined{font-size:18px}
  .rule.pass{color:var(--success)}
  .rule.fail{color:var(--muted)}

  .match-err{display:none;font-size:12px;color:var(--danger);margin-bottom:12px;align-items:center;gap:6px;font-family:'Inter',sans-serif}
  .match-err.show{display:flex}

  .submit-btn{
    width:100%;padding:14px;border:none;border-radius:4px;
    background:var(--accent);color:#0a0806;font-size:15px;font-weight:700;
    cursor:pointer;transition:filter .15s,opacity .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Inter',sans-serif;letter-spacing:.02em;text-transform:uppercase;
  }
  .submit-btn:hover{filter:brightness(1.08)}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}

  .err-msg{font-family:'Inter',sans-serif;font-size:13px;color:var(--danger);margin-top:12px;text-align:center;display:none}
  .err-msg.show{display:block}
  .success-msg{font-family:'Inter',sans-serif;font-size:13px;color:var(--accent);margin-top:12px;text-align:center;display:none}
  .success-msg.show{display:block}
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="tech-pattern"></div>

  <div class="card">
    <h2>Set new password</h2>

    <div class="field">
      <label for="newPassword">New password</label>
      <div class="pwd-wrap">
        <input type="password" id="newPassword" placeholder="••••••••" />
        <button type="button" class="reveal" data-target="newPassword"><span class="material-symbols-outlined">visibility</span></button>
      </div>
    </div>

    <div class="strength-bars">
      <div class="strength-bar" id="bar1"></div>
      <div class="strength-bar" id="bar2"></div>
      <div class="strength-bar" id="bar3"></div>
      <div class="strength-bar" id="bar4"></div>
    </div>

    <div class="rules">
      <div class="rule fail" id="ruleLength"><span class="material-symbols-outlined">radio_button_unchecked</span> At least 8 characters</div>
      <div class="rule fail" id="ruleLetter"><span class="material-symbols-outlined">radio_button_unchecked</span> Contains a letter</div>
      <div class="rule fail" id="ruleNumber"><span class="material-symbols-outlined">radio_button_unchecked</span> Contains a number</div>
      <div class="rule fail" id="ruleSpecial"><span class="material-symbols-outlined">radio_button_unchecked</span> Contains a special character</div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <div class="pwd-wrap">
        <input type="password" id="confirmPassword" placeholder="••••••••" />
        <button type="button" class="reveal" data-target="confirmPassword"><span class="material-symbols-outlined">visibility</span></button>
      </div>
    </div>

    <div class="match-err" id="matchErr">
      <span class="material-symbols-outlined" style="font-size:16px">error</span> Passwords do not match
    </div>

    <div class="err-msg" id="err"></div>
    <div class="success-msg" id="success"></div>

    <button class="submit-btn" id="resetBtn" disabled>Reset password</button>
  </div>

<script>
(() => {
  const SUPABASE_URL = "https://akrxbxzcvnspbmvgdrci.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_OZxwZSoSNj9r0MIqVYZtbQ_NwNK0MlS";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = id => document.getElementById(id);
  const newPw = $("newPassword");
  const confirmPw = $("confirmPassword");
  const matchErr = $("matchErr");
  const resetBtn = $("resetBtn");

  let passwordChanged = false;

  // ---------- Navigation lock ----------
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    if (!passwordChanged) {
      history.pushState(null, '', location.href);
    }
  });

  window.addEventListener('beforeunload', (e) => {
    if (!passwordChanged) {
      e.preventDefault();
      e.returnValue = '';
      return '';
    }
  });
  // ------------------------------------

  document.querySelectorAll(".reveal").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (input) {
        const isPw = input.type === "password";
        input.type = isPw ? "text" : "password";
        btn.querySelector('span').textContent = isPw ? "visibility_off" : "visibility";
      }
    });
  });

  function updateStrength() {
    const pw = newPw.value;
    const rules = {
      length: pw.length >= 8,
      letter: /[a-zA-Z]/.test(pw),
      number: /[0-9]/.test(pw),
      special: /[^a-zA-Z0-9]/.test(pw)
    };

    Object.entries(rules).forEach(([rule, passed]) => {
      const el = $(`rule${rule.charAt(0).toUpperCase() + rule.slice(1)}`);
      if (el) {
        const icon = el.querySelector('.material-symbols-outlined');
        if (passed) {
          icon.textContent = 'check_circle';
          el.classList.add('pass');
          el.classList.remove('fail');
        } else {
          icon.textContent = 'radio_button_unchecked';
          el.classList.add('fail');
          el.classList.remove('pass');
        }
      }
    });

    const score = Object.values(rules).filter(Boolean).length;
    for (let i = 1; i <= 4; i++) {
      const bar = $(`bar${i}`);
      if (bar) bar.classList.toggle('active', i <= score);
    }

    const isStrong = Object.values(rules).every(v => v);
    const matches = newPw.value === confirmPw.value && newPw.value.length > 0;
    resetBtn.disabled = !(isStrong && matches);
    matchErr.classList.toggle('show', !matches && confirmPw.value.length > 0);
  }

  newPw.addEventListener('input', updateStrength);
  confirmPw.addEventListener('input', updateStrength);

  resetBtn.addEventListener("click", async () => {
    const pw = newPw.value;
    const confirm = confirmPw.value;
    const err = $("err");
    const success = $("success");

    err.classList.remove("show");
    success.classList.remove("show");

    if (pw !== confirm) {
      matchErr.classList.add("show");
      return;
    }

    if (pw.length < 8 || !/[a-zA-Z]/.test(pw) || !/[0-9]/.test(pw) || !/[^a-zA-Z0-9]/.test(pw)) {
      err.textContent = "Password must be at least 8 characters with 1 letter, 1 number, and 1 special character.";
      err.classList.add("show");
      return;
    }

    try {
      const { error: updateError } = await supabase.auth.updateUser({ password: pw });
      if (updateError) {
        // Replace Supabase's long policy message with our simpler one
        if (updateError.message.includes("Password should contain")) {
          throw new Error("Password must be at least 8 characters with 1 letter, 1 number, and 1 special character.");
        }
        throw updateError;
      }

      // Record the password change time in the profiles table
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user?.id) {
        await supabase.from('profiles').update({
          password_changed_at: new Date().toISOString()
        }).eq('id', session.user.id);
      }

      passwordChanged = true;
      success.textContent = "Password reset successfully! Redirecting to home...";
      success.classList.add("show");
      resetBtn.disabled = true;
      resetBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Done!';

      window.removeEventListener('beforeunload', () => {});
      window.onpopstate = null;

      setTimeout(() => {
        window.location.href = "index.html";
      }, 5000);

    } catch (e) {
      err.textContent = e.message || "Reset failed. The link may have expired.";
      err.classList.add("show");
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !resetBtn.disabled) resetBtn.click();
  });
})();
</script>
</body>
</html>
