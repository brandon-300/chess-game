<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chess 3D · Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <!-- Cropper.js -->
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0806;
            --card: rgba(20, 14, 8, 0.95);
            --panel: rgba(16, 10, 6, 0.98);
            --accent: #c9a84c;
            --accent2: #7a6230;
            --text: #f0e6ce;
            --muted: #6b5f4e;
            --border: rgba(201, 168, 76, 0.22);
            --danger: #cc0000;
            --success: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        header.app {
            background: rgba(10, 7, 4, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .brand { font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: 0.02em; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn {
            padding: 9px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
            border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
            transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            letter-spacing: 0.02em;
        }
        .btn:hover { border-color: var(--accent); background: var(--card); }
        .btn.primary { background: var(--accent); border-color: transparent; color: #0a0806; }
        .btn.primary:hover { filter: brightness(1.08); }
        .btn.danger { background: transparent; border-color: rgba(204, 0, 0, 0.25); color: var(--danger); }
        .btn.danger:hover { background: rgba(204, 0, 0, 0.12); }

        .container { max-width: 700px; margin: 24px auto; padding: 0 16px; width: 100%; flex: 1; }

        .glass-panel {
            background: rgba(16, 10, 6, 0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 4px; padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); margin-bottom: 20px;
        }
        .profile-header { display: flex; align-items: center; gap: 20px; }
        .avatar-section { position: relative; flex-shrink: 0; width: 90px; height: 90px; }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--accent); background: var(--panel);
        }
        .pencil-btn {
            position: absolute; bottom: 2px; right: 2px; width: 28px; height: 28px;
            border-radius: 50%; background: var(--accent); color: #0a0806; border: none;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5); transition: transform 0.1s;
        }
        .pencil-btn:active { transform: scale(0.95); }
        .pencil-btn.loading { pointer-events: none; opacity: 0.7; }
        .pencil-btn .spinner {
            display: none; width: 14px; height: 14px; border: 2px solid transparent;
            border-top-color: #0a0806; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        .pencil-btn.loading .spinner { display: block; }
        .pencil-btn.loading .edit-icon { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .user-info { flex: 1; }
        .user-info h2 { font-size: 24px; margin-bottom: 4px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
        .user-info .username {
            color: var(--muted); font-size: 14px;
            text-align: center;
        }
        .last-seen {
            color: var(--muted); font-size: 12px; margin-top: 8px;
            display: flex; align-items: center; gap: 6px;
            justify-content: center;
        }
        .status-dot-inline {
            width: 10px; height: 10px; border-radius: 50%; background: var(--muted);
            flex-shrink: 0;
        }
        .status-dot-inline.online { background: var(--success); }

        .field-group { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
        .field { flex: 1 1 calc(50% - 7px); min-width: 200px; }
        .field label {
            display: block; font-size: 11px; color: var(--accent2); margin-bottom: 6px; font-weight: 500;
            letter-spacing: 0.05em;
        }
        .field input, .field select {
            width: 100%; padding: 12px; border-radius: 4px; background: var(--panel);
            border: 1px solid var(--border); color: var(--text); font-size: 16px; outline: none;
            transition: border-color 0.15s; font-family: inherit;
        }
        .field input:focus, .field select:focus { border-color: var(--accent); }
        .field input[readonly] { opacity: 0.8; cursor: default; }

        .bottom-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .btn-red {
            background: var(--danger); color: #fff; border: none; padding: 12px 24px; border-radius: 4px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            transition: filter 0.15s; letter-spacing: 0.02em;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-red:hover { filter: brightness(1.1); }
        .btn-red:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
        .avatar-upload-input { display: none; }

        /* Button spinner */
        .btn-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        /* Crop modal */
        .crop-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999;
            justify-content: center; align-items: center;
        }
        .crop-modal.active { display: flex; }
        .crop-container {
            background: var(--panel); border: 1px solid var(--accent); border-radius: 8px; padding: 20px;
            max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column; gap: 16px;
        }
        .crop-container h3 { color: var(--accent); text-align: center; font-weight: 600; }
        .crop-image-wrapper {
            max-height: 60vh; overflow: hidden; display: flex; justify-content: center; background: #000;
        }
        .crop-image-wrapper img { max-width: 100%; display: block; }
        .crop-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .crop-actions button {
            padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent);
            transition: all 0.2s;
        }
        .crop-actions button.primary { background: var(--accent); color: #0a0806; }
        .crop-actions button.primary:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toast – scrollable */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
            opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 90vw; word-wrap: break-word; white-space: normal;
            max-height: 50vh; overflow-y: auto;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error { border-color: var(--danger); color: var(--danger); }

        footer { padding: 16px; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }

        @media (max-width: 500px) {
            .profile-header { flex-direction: column; align-items: center; text-align: center; }
            .user-info { text-align: center; }
        }
    </style>
</head>
<body>
    <header class="app">
        <div class="brand">Chess 3D</div>
        <div class="header-actions" id="headerActions"><!-- dynamic --></div>
    </header>

    <main class="container">
        <div class="glass-panel">
            <div class="profile-header">
                <div class="avatar-section" id="avatarSection">
                    <img class="avatar-img" id="avatarImg" src="" alt="Profile picture" />
                    <button class="pencil-btn" id="pencilBtn" title="Change photo">
                        <span class="edit-icon material-symbols-outlined" style="font-size:16px">edit</span>
                        <span class="spinner"></span>
                    </button>
                    <input type="file" class="avatar-upload-input" id="avatarInput" accept="image/*" />
                </div>
                <div class="user-info">
                    <h2 id="displayFullName">—</h2>
                    <div class="username" id="displayUsername">@—</div>
                    <div class="last-seen" id="displayLastSeen">
                        <span class="status-dot-inline" id="statusDot"></span>
                        <span id="statusText">—</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="field-group">
                <div class="field"><label for="fullNameInput">Full name</label><input id="fullNameInput" type="text" readonly /></div>
                <div class="field"><label for="usernameInput">Username</label><input id="usernameInput" type="text" readonly /></div>
            </div>
            <div class="field-group">
                <div class="field"><label for="emailInput">Email</label><input id="emailInput" type="email" readonly /></div>
                <div class="field"><label for="ageInput">Age</label><input id="ageInput" type="number" readonly /></div>
            </div>
            <div class="field-group">
                <div class="field"><label for="dobInput">Date of birth</label><input id="dobInput" type="date" readonly /></div>
                <div class="field"><label for="countryInput">Country</label><input id="countryInput" type="text" readonly /></div>
            </div>

            <!-- Passkey Section -->
            <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--border);">
                <label style="font-size:11px; color:var(--accent2); letter-spacing:.05em; margin-bottom:8px; display:block;">PASSKEY</label>
                <div id="passkeyStatus" style="font-size:14px; margin-bottom:8px; color:var(--muted);">
                    <!-- filled dynamically -->
                </div>
                <button class="btn primary" id="setupPasskeyBtn" style="display:none;">
                    <span class="material-symbols-outlined" style="font-size:16px;">vpn_key</span>
                    Set Up Passkey
                </button>
            </div>
        </div>

        <!-- Crop Modal -->
        <div class="crop-modal" id="cropModal">
            <div class="crop-container">
                <h3>Crop your photo</h3>
                <div class="crop-image-wrapper">
                    <img id="cropImage" src="" alt="" />
                </div>
                <div class="crop-actions">
                    <button id="cancelCropBtn">Cancel</button>
                    <button id="confirmCropBtn" class="primary">Crop &amp; Save</button>
                </div>
            </div>
        </div>

        <div class="bottom-actions" id="bottomActions"><!-- dynamic --></div>
    </main>

    <footer>Chess 3D · powered by Supabase</footer>

    <div id="toast"></div>

    <script>
        (() => {
            const SUPABASE_URL = "https://akrxbxzcvnspbmvgdrci.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_OZxwZSoSNj9r0MIqVYZtbQ_NwNK0MlS";
            // Enable experimental passkey API
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    experimental: { passkey: true }
                }
            });

            const $ = id => document.getElementById(id);
            const DEFAULT_AVATAR = "data:image/svg+xml;utf8," + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#2a2018"/><text x="50%" y="55%" font-family="sans-serif" font-size="40" fill="#7a6230" text-anchor="middle" dominant-baseline="middle">?</text></svg>'
            );

            let currentUserId = null;
            let originalProfile = null;
            let isEditing = false;
            let cropper = null;
            let hasPasskey = false;

            let heartbeatInterval;
            const INACTIVITY_LIMIT = 15 * 60 * 1000;
            let inactivityTimer;

            // --- Toast ---
            let toastTimer;
            function showToast(msg, type = 'success', duration = 3000) {
                const toast = $('toast');
                toast.textContent = msg;
                toast.className = type;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => { toast.classList.remove('show'); }, duration);
            }

            // --- Button loading helper ---
            function setButtonLoading(btn, loading, label) {
                if (loading) {
                    btn._originalHTML = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = `<span class="btn-spinner"></span> ${label || ''}`;
                } else {
                    btn.innerHTML = btn._originalHTML || btn.innerHTML;
                    btn.disabled = false;
                    delete btn._originalHTML;
                }
            }

            // --- Online / Heartbeat ---
            async function performLogout() {
                if (currentUserId) await setOnlineStatus(false);
                stopHeartbeat();
                clearTimeout(inactivityTimer);
                await supabase.auth.signOut();
                window.location.href = "index.html";
            }
            function resetInactivity() {
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(performLogout, INACTIVITY_LIMIT);
            }
            function setupInactivity() {
                ['mousemove','keydown','mousedown','touchstart','scroll'].forEach(evt =>
                    document.addEventListener(evt, resetInactivity, { passive:true })
                );
                resetInactivity();
            }
            function startHeartbeat() {
                heartbeatInterval = setInterval(async () => {
                    if (!currentUserId || document.hidden) return;
                    await supabase.from('profiles')
                        .update({ last_seen: new Date().toISOString(), is_online: true })
                        .eq('id', currentUserId);
                }, 30000);
            }
            function stopHeartbeat() { clearInterval(heartbeatInterval); }
            async function setOnlineStatus(online) {
                if (!currentUserId) return;
                await supabase.from('profiles')
                    .update({ is_online: online, last_seen: new Date().toISOString() })
                    .eq('id', currentUserId);
            }

            // --- Profile Rendering ---
            function renderProfile(profile) {
                originalProfile = { ...profile };
                $('avatarImg').src = profile?.avatar_url || DEFAULT_AVATAR;
                $('avatarImg').onerror = () => { $('avatarImg').src = DEFAULT_AVATAR; };

                const dot = $('statusDot');
                const textEl = $('statusText');
                if (profile?.is_online) {
                    dot.classList.add('online');
                    textEl.textContent = 'Online';
                } else {
                    dot.classList.remove('online');
                    textEl.textContent = profile?.last_seen
                        ? 'Last seen: ' + new Date(profile.last_seen).toLocaleString()
                        : 'Last seen: —';
                }

                $('displayFullName').textContent = profile?.full_name || '—';
                $('displayUsername').textContent = profile?.username ? '@' + profile.username : '@—';
                $('fullNameInput').value = profile?.full_name || '';
                $('usernameInput').value = profile?.username || '';
                $('emailInput').value = profile?.email || '';
                $('ageInput').value = profile?.age != null ? profile.age : '';
                $('dobInput').value = profile?.dob || '';
                $('countryInput').value = profile?.country || '';

                // Passkey status
                hasPasskey = !!profile?.passkey_created_at;
                updatePasskeyUI();
            }

            function updatePasskeyUI() {
                const statusEl = $('passkeyStatus');
                const btn = $('setupPasskeyBtn');
                if (hasPasskey) {
                    statusEl.innerHTML = '<span style="color:var(--success);">✓</span> Passkey is active';
                    btn.style.display = 'none';
                } else {
                    statusEl.innerHTML = 'No passkey set. You can add one for faster sign‑in.';
                    btn.style.display = 'inline-flex';
                }
            }

            // Passkey setup – coming soon
            function setupPasskey() {
                showToast("Coming soon…", "success");
            }

            $('setupPasskeyBtn').addEventListener('click', setupPasskey);

            function setEditMode(enabled) {
                isEditing = enabled;
                ['fullNameInput','usernameInput','emailInput','ageInput','dobInput','countryInput'].forEach(id => {
                    $(id)[enabled ? 'removeAttribute' : 'setAttribute']('readonly', true);
                });
                updateHeaderButtons();
            }

            function updateHeaderButtons() {
                const container = $('headerActions');
                container.innerHTML = '';

                const backBtn = document.createElement('button');
                backBtn.className = 'btn';
                backBtn.innerHTML = '<span class="material-symbols-outlined">arrow_back</span> Back';
                backBtn.addEventListener('click', () => {
                    window.location.href = "index.html";
                });
                container.appendChild(backBtn);

                if (isEditing) {
                    const saveBtn = document.createElement('button');
                    saveBtn.className = 'btn primary';
                    saveBtn.textContent = 'Save';
                    saveBtn.addEventListener('click', async () => {
                        setButtonLoading(saveBtn, true, 'Saving…');
                        await saveProfile();
                        setButtonLoading(saveBtn, false);
                    });
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn';
                    cancelBtn.textContent = 'Cancel';
                    cancelBtn.addEventListener('click', cancelEdit);
                    container.appendChild(saveBtn);
                    container.appendChild(cancelBtn);
                } else {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn primary';
                    editBtn.textContent = 'Edit Profile';
                    editBtn.addEventListener('click', () => setEditMode(true));
                    container.appendChild(editBtn);
                }
            }

            function cancelEdit() {
                if (originalProfile) renderProfile(originalProfile);
                setEditMode(false);
            }

            async function saveProfile() {
                const fullName = $('fullNameInput').value.trim();
                const username = $('usernameInput').value.trim();
                const email = $('emailInput').value.trim();
                const age = parseInt($('ageInput').value) || null;
                const dob = $('dobInput').value;
                const country = $('countryInput').value.trim();

                if (!fullName || !username || !email) {
                    showToast('All fields are required.', 'error');
                    return;
                }
                if (age && age < 14) {
                    showToast('You must be at least 14 years old.', 'error');
                    return;
                }
                try {
                    const { data: exist } = await supabase.from('profiles')
                        .select('id').eq('username', username).neq('id', currentUserId)
                        .maybeSingle();
                    if (exist) {
                        showToast('Username already taken.', 'error');
                        return;
                    }
                    if (email !== originalProfile.email) {
                        const { error: authUpdateErr } = await supabase.auth.updateUser({ email });
                        if (authUpdateErr) throw new Error('Failed to update login email: ' + authUpdateErr.message);
                    }
                    const updates = {
                        full_name: fullName,
                        username,
                        email,
                        age: age || null,
                        dob: dob || null,
                        country: country || null
                    };
                    const { error } = await supabase.from('profiles').update(updates).eq('id', currentUserId);
                    if (error) throw error;
                    $('displayFullName').textContent = fullName;
                    $('displayUsername').textContent = '@' + username;
                    showToast('Profile updated.', 'success');
                    setEditMode(false);
                } catch (e) {
                    showToast(e.message, 'error');
                }
            }

            // --- Avatar Upload (unchanged) ---
            function openCropModal(file) {
                if (cropper) { cropper.destroy(); cropper = null; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    $('cropImage').src = e.target.result;
                    $('cropModal').classList.add('active');
                    cropper = new Cropper($('cropImage'), {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxResizable: false,
                        background: false
                    });
                };
                reader.readAsDataURL(file);
            }
            function closeCropModal() {
                $('cropModal').classList.remove('active');
                if (cropper) { cropper.destroy(); cropper = null; }
                $('cropImage').src = '';
                $('avatarInput').value = '';
            }
            async function handleCropConfirm() {
                if (!cropper) return;
                const confirmBtn = $('confirmCropBtn');
                setButtonLoading(confirmBtn, true, 'Uploading…');

                try {
                    const canvas = cropper.getCroppedCanvas({ width: 256, height: 256 });
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/webp', 0.9));

                    const path = `${currentUserId}-${Date.now()}.webp`;
                    const { error: uploadErr } = await supabase.storage
                        .from('avatars')
                        .upload(path, blob, { contentType: 'image/webp', upsert: true });

                    if (uploadErr) throw new Error('Upload failed: ' + uploadErr.message);

                    const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path);
                    const avatarUrl = urlData.publicUrl;
                    if (!avatarUrl) throw new Error('Could not get URL');

                    const { error: updateErr } = await supabase
                        .from('profiles')
                        .update({ avatar_url: avatarUrl })
                        .eq('id', currentUserId);
                    if (updateErr) throw new Error('DB update failed: ' + updateErr.message);

                    $('avatarImg').src = avatarUrl;
                    showToast('Avatar updated.', 'success');
                    closeCropModal();
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    setButtonLoading(confirmBtn, false);
                }
            }

            // --- Init ---
            async function init() {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = "user_login.html?redirect=" + encodeURIComponent(window.location.pathname);
                    return;
                }
                currentUserId = session.user.id;

                await setOnlineStatus(true);
                setupInactivity();
                startHeartbeat();

                window.addEventListener('beforeunload', () => {
                    if (currentUserId) {
                        const payload = JSON.stringify({ is_online: false, last_seen: new Date().toISOString() });
                        if (navigator.sendBeacon) {
                            const blob = new Blob([payload], { type: 'application/json' });
                            navigator.sendBeacon(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUserId}`, blob);
                        } else {
                            supabase.from('profiles').update({ is_online: false, last_seen: new Date().toISOString() }).eq('id', currentUserId);
                        }
                    }
                });

                const profile = await loadProfile();
                if (profile) renderProfile(profile);
                else renderProfile({});
                updateHeaderButtons();

                // Avatar upload listeners
                $('pencilBtn').addEventListener('click', () => $('avatarInput').click());
                $('avatarInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    openCropModal(file);
                });
                $('cancelCropBtn').addEventListener('click', closeCropModal);
                $('confirmCropBtn').addEventListener('click', handleCropConfirm);
                $('cropModal').addEventListener('click', (e) => {
                    if (e.target === $('cropModal')) closeCropModal();
                });

                const bottom = $('bottomActions');

                // Logout button
                const logoutBtn = document.createElement('button');
                logoutBtn.className = 'btn-red';
                logoutBtn.textContent = 'Logout';
                logoutBtn.addEventListener('click', async () => {
                    if (logoutBtn.disabled) return;
                    setButtonLoading(logoutBtn, true, 'Logging out…');
                    try {
                        if (currentUserId) await setOnlineStatus(false);
                        stopHeartbeat();
                        clearTimeout(inactivityTimer);
                        await supabase.auth.signOut();
                        setTimeout(() => { window.location.href = "index.html"; }, 1500);
                    } catch (e) {
                        setButtonLoading(logoutBtn, false);
                        showToast('Logout failed: ' + (e.message || 'Unknown error'), 'error');
                    }
                });

                // Delete account button
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-red';
                deleteBtn.style.background = 'transparent';
                deleteBtn.style.border = '1px solid rgba(204,0,0,.25)';
                deleteBtn.style.color = 'var(--danger)';
                deleteBtn.textContent = 'Delete Account';
                deleteBtn.addEventListener('click', async () => {
                    if (!confirm('Are you sure you want to delete your account? This cannot be undone.')) return;
                    if (!confirm('Final confirmation: delete your account?')) return;

                    setButtonLoading(deleteBtn, true, 'Deleting…');
                    try {
                        await supabase.from('profiles').delete().eq('id', currentUserId);
                        stopHeartbeat();
                        clearTimeout(inactivityTimer);
                        try {
                            await supabase.functions.invoke('delete-user', { body: { user_id: currentUserId } });
                        } catch (e) {
                            console.warn('Edge Function delete-user not available:', e);
                        }
                        await supabase.auth.signOut();
                        deleteBtn.innerHTML = 'Account deleted successfully';
                        setTimeout(() => { location.href = "index.html"; }, 2000);
                    } catch (e) {
                        setButtonLoading(deleteBtn, false);
                        showToast('Delete failed: ' + (e.message || 'Unknown error'), 'error');
                    }
                });

                bottom.appendChild(logoutBtn);
                bottom.appendChild(deleteBtn);

                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        setOnlineStatus(true);
                        resetInactivity();
                    }
                });
            }

            async function loadProfile() {
                const { data } = await supabase.from('profiles').select('*').eq('id', currentUserId).single();
                return data;
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
